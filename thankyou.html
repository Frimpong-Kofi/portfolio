<!DOCTYPE html>
<html lang="en">

<head>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css">
    <title>Thank you page</title>

        }

            padding: 30px;

            <p>Your message is important, I will get back to you soon!</p>
            <div class="d-flex justify-content-center emoji">
                <p>&#128522;</p>

            </div>
        </div>
        <a href="https://frimpong-kofi.github.io/portfolio" class="btn btn-outline-primary mt-5"> Go to Home page</a>

</html>
